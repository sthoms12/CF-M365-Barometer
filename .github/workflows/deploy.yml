name: Deploy Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-production
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm run check
      - run: npm run build

  deploy:
    if: vars.CLOUDFLARE_DEPLOY_ENABLED == 'true'
    needs: check
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      INGEST_TOKEN: ${{ secrets.INGEST_TOKEN }}
      WORKER_GITHUB_TOKEN: ${{ secrets.WORKER_GITHUB_TOKEN }}
      PUBLIC_BASE_URL: ${{ vars.PUBLIC_BASE_URL }}
      ACCESS_TEAM_DOMAIN: ${{ vars.ACCESS_TEAM_DOMAIN }}
      ACCESS_AUD: ${{ vars.ACCESS_AUD }}
      CUSTOM_DOMAIN: ${{ vars.CUSTOM_DOMAIN }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm run types
      - run: npm run build

      - name: Validate deployment credentials
        shell: bash
        run: |
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$INGEST_TOKEN"
          test -n "$WORKER_GITHUB_TOKEN"

      - name: Find or create D1 database
        id: d1
        shell: bash
        run: |
          database_id="$(npx wrangler d1 list --json | jq -r '.[] | select(.name == "m365-barometer") | .uuid' | head -n 1)"
          if [ -z "$database_id" ]; then
            npx wrangler d1 create m365-barometer
            database_id="$(npx wrangler d1 list --json | jq -r '.[] | select(.name == "m365-barometer") | .uuid' | head -n 1)"
          fi
          test -n "$database_id"
          echo "database_id=$database_id" >> "$GITHUB_OUTPUT"

      - name: Render production configuration
        env:
          D1_DATABASE_ID: ${{ steps.d1.outputs.database_id }}
        run: npm run config:production

      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply m365-barometer --remote --config wrangler.production.jsonc

      - name: Deploy Worker
        run: npx wrangler deploy --config wrangler.production.jsonc

      - name: Configure Worker secrets
        shell: bash
        run: |
          printf '%s' "$INGEST_TOKEN" | npx wrangler secret put INGEST_TOKEN --config wrangler.production.jsonc
          printf '%s' "$WORKER_GITHUB_TOKEN" | npx wrangler secret put GITHUB_TOKEN --config wrangler.production.jsonc

      - name: Smoke test
        shell: bash
        run: |
          if [ -n "$PUBLIC_BASE_URL" ]; then
            curl --fail --silent --show-error --retry 5 --retry-delay 5 "$PUBLIC_BASE_URL/api/health"
          else
            echo "PUBLIC_BASE_URL is not configured; skipping smoke test until the first deployment URL is known."
          fi
